name: E2E Tests

# Trigger on push to main/feat branches and on pull requests
on:
  push:
    branches:
      - main
      - feat/**
  pull_request:
    branches:
      - main

jobs:
  e2e-tests:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # PostgreSQL service container for test database
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dental_care_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # Setup test database schema
      - name: Setup test database
        run: |
          # Create tables using psql
          PGPASSWORD=postgres psql -h localhost -U postgres -d dental_care_test << 'EOF'
          -- Lead contacts table
          CREATE TABLE IF NOT EXISTS test_contact_lead (
            id SERIAL PRIMARY KEY,
            nombre VARCHAR(255) NOT NULL,
            email VARCHAR(255),
            telefono VARCHAR(50) NOT NULL,
            cedula VARCHAR(50),
            edad VARCHAR(10) NOT NULL,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );

          -- Patient limit table
          CREATE TABLE IF NOT EXISTS test_patients_limit (
            id SERIAL PRIMARY KEY,
            limite INTEGER NOT NULL,
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );

          -- Verify tables created
          \dt
          EOF
        env:
          PGPASSWORD: postgres

      # Create .env.test file for tests
      - name: Create test environment file
        run: |
          cat > .env.test << EOF
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/dental_care_test
          DIRECT_URL=postgresql://postgres:postgres@localhost:5432/dental_care_test
          ADMIN_PASSWORD=${{ secrets.TEST_ADMIN_PASSWORD || 'test_password_123' }}
          TABLE_LEAD_CONTACTS=test_contact_lead
          LIMIT_TABLE=test_patients_limit
          NEXT_PUBLIC_APP_URL=http://localhost:3000
          NODE_ENV=test
          EOF

      # Run Playwright tests
      - name: Run Playwright tests
        run: npx playwright test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dental_care_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/dental_care_test
          ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD || 'test_password_123' }}
          TABLE_LEAD_CONTACTS: test_contact_lead
          LIMIT_TABLE: test_patients_limit
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NODE_ENV: test

      # Upload Playwright report on failure
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # Upload test results for GitHub UI
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30

  # Optional: Send notification on failure
  notify-on-failure:
    name: Notify on Test Failure
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: failure()
    steps:
      - name: Notify failure
        run: |
          echo "E2E tests failed! Check the artifacts for details."
          echo "View the Playwright report in the workflow artifacts."
