name: E2E Tests

# Disparadores ajustados a tu rama 'master'
on:
  push:
    branches:
      - master
      - feat/**
  pull_request:
    branches:
      - master

jobs:
  e2e-tests:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Base de datos aislada para pruebas rápidas
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dental_care_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install # Usamos install para asegurar compatibilidad

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Setup test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d dental_care_test << 'EOF'
          -- Tabla de contactos corregida
          CREATE TABLE IF NOT EXISTS test_contact_lead (
            id SERIAL PRIMARY KEY,
            nombre VARCHAR(255) NOT NULL,
            email VARCHAR(255),
            telefono VARCHAR(50) NOT NULL,
            cedula VARCHAR(50),
            edad VARCHAR(10) NOT NULL,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );

          -- Tabla de límites corregida
          CREATE TABLE IF NOT EXISTS test_patients_limit (
            id SERIAL PRIMARY KEY,
            limite INTEGER NOT NULL,
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          \dt
          EOF
        env:
          PGPASSWORD: postgres

      - name: Create test environment file
        run: |
          cat > .env.test << EOF
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/dental_care_test
          DIRECT_URL=postgresql://postgres:postgres@localhost:5432/dental_care_test
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          TABLE_LEAD_CONTACTS=test_contact_lead
          LIMIT_TABLE=test_patients_limit
          NEXT_PUBLIC_APP_URL=http://localhost:3000
          NODE_ENV=test
          EOF

      - name: Run Playwright tests
        run: npx playwright test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dental_care_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/dental_care_test
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          TABLE_LEAD_CONTACTS: test_contact_lead
          LIMIT_TABLE: test_patients_limit
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NODE_ENV: test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  notify-on-failure:
    name: Notify on Test Failure
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: failure()
    steps:
      - name: Notify failure
        run: |
          echo "E2E tests failed! Check the artifacts for details."